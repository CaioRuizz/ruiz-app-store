manifestVersion: 1
id: ruiz-ubuntu-server
name: Ubuntu Server
tagline: A bare Ubuntu server with SSH access on your host network
icon: https://assets.ubuntu.com/v1/29985a98-ubuntu-logo32.png
category: developer-tools
version: "1.1.2"
description: >-
  A plain Ubuntu 24.04 LTS server running directly on your host network with
  OpenSSH and a browser-based terminal (ttyd).

  Open the web UI to get a full shell as the ubuntu user (passwordless sudo
  enabled). You can also connect via SSH on port 2222 with the same credentials.

  Useful as a general-purpose Linux environment, a build machine, or a jump
  host that lives inside your Umbrel's network.

developer: "Caio Ruiz"
website: "https://github.com/CaioRuizz/ruiz-app-store"
dependencies: []
repo: "https://github.com/CaioRuizz/ruiz-app-store"
support: "https://github.com/CaioRuizz/ruiz-app-store/issues"
port: 4000
gallery: []
path: ""
defaultUsername: "ubuntu"
defaultPassword: "umbrel"
releaseNotes: "Fix web terminal shell exit by using su instead of uid/gid drop"
