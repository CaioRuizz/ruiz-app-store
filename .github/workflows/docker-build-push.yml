name: Build and push Docker images

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  discover:
    name: Discover apps
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find-apps.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find app directories with Dockerfiles
        id: find-apps
        run: |
          set -euo pipefail
          MATRIX=$(find . -path './ruiz-*/*/Dockerfile' | sed 's|^\./||; s|/Dockerfile$||' | sort | jq -R -s -c '
            split("\n") | map(select(length > 0)) | map({
              path: .,
              image: gsub("/"; "-")
            })
          ')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: discover
    strategy:
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read app version from umbrel-app.yml
        id: get-version
        run: |
          set -euo pipefail
          APP_DIR=$(dirname "${{ matrix.path }}")
          FILE="$APP_DIR/umbrel-app.yml"
          if [ ! -f "$FILE" ]; then
            echo "version=latest" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION=$(grep -E '^[[:space:]]*version:' "$FILE" | sed -E 's/^[[:space:]]*version:[[:space:]]*"?([^" ]+)"?/\1/')
          if [ -z "$VERSION" ]; then
            echo "version=latest" >> "$GITHUB_OUTPUT"
          else
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.path }}
          file: ${{ matrix.path }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:latest
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ steps.get-version.outputs.version }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:cache
          cache-to: type=inline

  update-compose-versions:
    name: Update docker-compose versions
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Update docker-compose image tags
        run: |
          set -euo pipefail
          for APP_DIR in ruiz-*/; do
            APP_DIR="${APP_DIR%/}"
            VERSION=$(grep -E '^[[:space:]]*version:' "$APP_DIR/umbrel-app.yml" | sed -E 's/^[[:space:]]*version:[[:space:]]*"?([^" ]+)"?/\1/')
            sed -i -E "s|(image: [^:]+):([0-9]+\.[0-9]+\.[0-9]+)|\1:$VERSION|g" "$APP_DIR/docker-compose.yml"
            echo "Updated $APP_DIR/docker-compose.yml to $VERSION"
          done

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ruiz-*/docker-compose.yml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update docker-compose image versions [skip ci]"
            git push
          fi
