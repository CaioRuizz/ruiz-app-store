version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: ruiz-claude-server_nginx_1
      APP_PORT: 80

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: on-failure

  backend:
    image: caioruizz/claude-server-backend:1.0.0
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATA_DIR=/data
      - WORKSPACES_DIR=/workspaces
    volumes:
      - "${APP_DATA_DIR:-./umbrel-data}/data:/data"
      - "${APP_DATA_DIR:-./umbrel-data}/workspaces:/workspaces"
    restart: on-failure

  frontend:
    image: caioruizz/claude-server-frontend:1.0.0
    environment:
      - NODE_ENV=production
    restart: on-failure
