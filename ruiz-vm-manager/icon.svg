<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#1e293b"/>
  <!-- Server/monitor body -->
  <rect x="18" y="20" width="64" height="44" rx="4" fill="#334155" stroke="#475569" stroke-width="1.5"/>
  <!-- Screen bezel -->
  <rect x="23" y="25" width="54" height="34" rx="2" fill="#0f172a"/>
  <!-- Terminal lines -->
  <rect x="27" y="30" width="20" height="2.5" rx="1" fill="#22d3ee" opacity="0.9"/>
  <rect x="27" y="36" width="32" height="2.5" rx="1" fill="#94a3b8" opacity="0.7"/>
  <rect x="27" y="42" width="26" height="2.5" rx="1" fill="#94a3b8" opacity="0.7"/>
  <rect x="27" y="48" width="14" height="2.5" rx="1" fill="#22d3ee" opacity="0.9"/>
  <!-- Cursor blink -->
  <rect x="43" y="48" width="6" height="2.5" rx="0.5" fill="#f1f5f9" opacity="0.8"/>
  <!-- Stand -->
  <rect x="44" y="64" width="12" height="6" rx="1" fill="#475569"/>
  <rect x="36" y="70" width="28" height="4" rx="2" fill="#475569"/>
  <!-- Chip indicators -->
  <circle cx="74" cy="31" r="3" fill="#10b981" opacity="0.9"/>
  <circle cx="74" cy="40" r="3" fill="#f59e0b" opacity="0.7"/>
  <circle cx="74" cy="49" r="3" fill="#334155"/>
