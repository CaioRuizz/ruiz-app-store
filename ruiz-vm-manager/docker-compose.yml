version: "3.7"

networks:
  umbrel_main_network:
    external: true

services:
  app_proxy:
    environment:
      APP_HOST: ruiz-vm-manager_nginx_1
      APP_PORT: 80
    networks:
      - umbrel_main_network
    restart: on-failure

  nginx:
    image: caioruizz/vm-manager-nginx:1.0.1
    depends_on:
      - backend
      - frontend
    networks:
      - umbrel_main_network
    restart: on-failure

  backend:
    image: caioruizz/vm-manager-backend:1.0.1
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATA_DIR=/data
    volumes:
      - "${APP_DATA_DIR:-./umbrel-data}/data:/data"
    devices:
      - /dev/kvm:/dev/kvm
    cap_add:
      - NET_ADMIN
    networks:
      - umbrel_main_network
    restart: on-failure

  frontend:
    image: caioruizz/vm-manager-frontend:1.0.1
    environment:
      - NODE_ENV=production
    networks:
      - umbrel_main_network
    restart: on-failure
