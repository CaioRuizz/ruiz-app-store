manifestVersion: 1
id: ruiz-vm-manager
name: VM Manager
tagline: Create and manage virtual machines from your browser
icon: https://raw.githubusercontent.com/CaioRuizz/ruiz-app-store/master/ruiz-vm-manager/icon.svg
category: developer-tools
version: "1.0.0"
description: >-
  Launch and manage virtual machines directly from your Umbrel. Pick from
  popular Linux distributions — Ubuntu, Debian, Fedora, Alpine — set how many
  CPU cores and how much RAM and storage to allocate, and your VM is up in
  seconds using cloud-ready images (no install wizard needed).

  Access each VM's console right in the browser via noVNC. Start, stop,
  and delete VMs at any time. KVM acceleration is used automatically when
  the host supports it.

