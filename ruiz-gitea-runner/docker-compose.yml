version: "3.7"

networks:
  umbrel_main_network:
    external: true

services:
  app_proxy:
    environment:
      APP_HOST: ruiz-gitea-runner_nginx_1
      APP_PORT: 80
    networks:
      - umbrel_main_network
    restart: on-failure

  nginx:
    image: caioruizz/ruiz-gitea-runner-nginx:1.1.0
    depends_on:
      - backend
      - frontend
    networks:
      - umbrel_main_network
    restart: on-failure

  backend:
    image: caioruizz/ruiz-gitea-runner-backend:1.1.0
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATA_DIR=/data
    volumes:
      - "${APP_DATA_DIR:-./umbrel-data}/data:/data"
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - umbrel_main_network
    restart: on-failure

  frontend:
    image: caioruizz/ruiz-gitea-runner-frontend:1.1.0
    environment:
      - NODE_ENV=production
    networks:
      - umbrel_main_network
    restart: on-failure
